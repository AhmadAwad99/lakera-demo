<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lakera Guard Demo</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Lakera Guard Prompt Injection-HealthCare Use Case</h1>
      <p class="subtitle">
        showing how Lakera Guard Secure the Healthcare Sector.
      </p>

      <div class="actions">
  <button type="button" class="secondary" onclick="fillNormal()">Try safe prompt</button>
  <button type="button" class="secondary" onclick="fillAttack()">Try injection prompt</button>
</div>
<div class="toggle-container">
  <span>Lakera Guard</span>
  <button id="lakeraToggle" class="toggle active">ON</button>
</div>
      <div id="chat"></div>

      <form id="chatForm">
        <textarea id="message" rows="4" placeholder="Type your prompt..."></textarea>
        <button type="submit">Send</button>
      </form>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
